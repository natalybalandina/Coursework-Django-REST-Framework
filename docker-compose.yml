version: '3.8'

services:
  # PostgreSQL база данных
  db:
    image: postgres:15-alpine
    container_name: habittracker_db
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-habittracker}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - habittracker_network

  # Redis для Celery
  redis:
    image: redis:7-alpine
    container_name: habittracker_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - habittracker_network

  # Django
  web:
    build: .
    container_name: habittracker_web
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    expose:
      - 8000
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - habittracker_network

  # Celery worker
  celery:
    build: .
    container_name: habittracker_celery
    restart: unless-stopped
    command: celery -A config worker -l info
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - web
      - redis
      - db
    networks:
      - habittracker_network

  # Celery beat
  celery-beat:
    build: .
    container_name: habittracker_celery_beat
    restart: unless-stopped
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - web
      - redis
      - db
    networks:
      - habittracker_network

  # Nginx для статических файлов и проксирования
  nginx:
    image: nginx:1.25-alpine
    container_name: habittracker_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/static
      - media_volume:/media
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
    networks:
      - habittracker_network

  # Telegram бот (опционально)
  telegram-bot:
    build: .
    container_name: habittracker_telegram_bot
    restart: unless-stopped
    command: python manage.py run_bot
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - web
      - db
      - redis
    networks:
      - habittracker_network


volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:


networks:
  habittracker_network:
    driver: bridge